name: Build CDR Photo Match Pro

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore CDRPhotoMatchPro.csproj -PackagesDirectory packages

      - name: Build Release
        run: msbuild CDRPhotoMatchPro.csproj /p:Configuration=Debug

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: CDRPhotoMatchPro-Release
          path: bin/Release/**
