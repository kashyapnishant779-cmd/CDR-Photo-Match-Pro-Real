name: Build CDR Photo Match Pro

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore CDRPhotoMatchPro.csproj -PackagesDirectory packages
      - name: Install SQLite
        run: nuget install System.Data.SQLite.Core -Version 1.0.118.0 -OutputDirectory packages

      - name: Install OpenCvSharp
        run: nuget install OpenCvSharp4 -Version 4.10.0.20240616 -OutputDirectory packages

      - name: Install OpenCvSharp Runtime
        run: nuget install OpenCvSharp4.runtime.win -Version 4.10.0.20240616 -OutputDirectory packages
      - name: Build Release
        run: msbuild CDRPhotoMatchPro.csproj /p:Configuration=Debug /p:TargetFrameworkVersion=v4.8

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: CDRPhotoMatchPro-Release
          path: bin/Release/**
