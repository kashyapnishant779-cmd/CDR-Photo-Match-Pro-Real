name: Build CDR Photo Match Pro

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore packages.config -PackagesDirectory packages

      - name: List packages
        run: dir packages

      - name: List SQLite files
        shell: cmd
        run: dir packages\System.Data.SQLite.Core.1.0.118.0 /s

      - name: Build Release
        run: msbuild CDRPhotoMatchPro.csproj /p:Configuration=Debug /p:Platform="AnyCPU"

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: CDRPhotoMatchPro-Release
          path: bin/Debug/**
