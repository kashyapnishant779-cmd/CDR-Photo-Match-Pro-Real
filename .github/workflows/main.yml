name: Build CDR Photo Match Pro

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore packages.config -PackagesDirectory packages

      - name: Build Release
        run: msbuild CDRPhotoMatchPro.csproj /p:Configuration=Debug /p:Platform="AnyCPU"

      - name: Copy required DLLs
        shell: cmd
        run: |
          if not exist bin\Debug mkdir bin\Debug
          copy packages\OpenCvSharp4.4.5.5.20211231\lib\netstandard2.0\OpenCvSharp.dll bin\Debug\
          copy packages\OpenCvSharp4.runtime.win.4.5.5.20211231\runtimes\win-x64\native\OpenCvSharpExtern.dll bin\Debug\
          copy packages\System.Data.SQLite.Core.1.0.118.0\lib\net46\System.Data.SQLite.dll bin\Debug\
          copy packages\System.Data.SQLite.Core.1.0.118.0\build\net46\x64\SQLite.Interop.dll bin\Debug\

      - name: Show output files
        shell: cmd
        run: dir bin\Debug

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: CDRPhotoMatchPro-Release
          path: bin/Debug/**
